<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Presenter View · IA: Revolución en el Desarrollo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b1020;
    --bg-2: #0e1530;
    --surface: #121b38;
    --border: #243160;
    --border-soft: #1a2547;
    --text: #e8edff;
    --muted: #8a96b8;
    --dim: #5d6a8e;
    --accent: #4d8dff;
    --accent-2: #6ee7ff;
    --accent-soft: rgba(77, 141, 255, 0.14);
    --danger: #ff6b6b;
    --warn: #ffc66e;
    --ok: #6ee7a8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
  }

  .presenter {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr auto;
    gap: 0;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header bar ── */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .slide-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--accent-2);
    letter-spacing: -0.02em;
  }
  .slide-counter .sep { color: var(--dim); margin: 0 6px; font-weight: 400; }
  .slide-counter .total { color: var(--dim); }
  .slide-title {
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.04em;
  }
  .timer-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--dim);
    text-align: right;
  }
  .timer-group { text-align: right; }
  .nav-btns {
    display: flex;
    gap: 8px;
  }
  .nav-btn {
    appearance: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    padding: 8px 18px;
    cursor: pointer;
    transition: background 140ms, border-color 140ms;
  }
  .nav-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .nav-btn:active { background: rgba(77, 141, 255, 0.25); }
  .timer-btn {
    appearance: none;
    background: transparent;
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 140ms, border-color 140ms;
  }
  .timer-btn:hover { color: var(--accent-2); border-color: var(--accent); }

  /* ── Main content area ── */
  .col-notes {
    padding: 28px 36px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }
  .col-guide {
    padding: 28px 36px;
    overflow-y: auto;
  }

  .col-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .col-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  /* Speaker notes */
  .notes-timing {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: var(--accent-2);
    background: rgba(110, 231, 255, 0.08);
    border: 1px solid rgba(110, 231, 255, 0.2);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 20px;
    display: inline-block;
  }
  .notes-body {
    font-size: 20px;
    line-height: 1.65;
    color: var(--text);
    max-width: 720px;
  }
  .notes-body em {
    color: var(--accent-2);
    font-style: normal;
    font-weight: 500;
  }

  /* Key points */
  .key-points {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .key-points li {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    font-size: 19px;
    line-height: 1.5;
    color: var(--text);
  }
  .key-points .bullet {
    flex-shrink: 0;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    margin-top: 3px;
  }
  .bullet-talk { background: rgba(77, 141, 255, 0.15); color: var(--accent); border: 1px solid rgba(77, 141, 255, 0.3); }
  .bullet-do { background: rgba(110, 231, 168, 0.12); color: var(--ok); border: 1px solid rgba(110, 231, 168, 0.3); }
  .bullet-warn { background: rgba(255, 198, 110, 0.12); color: var(--warn); border: 1px solid rgba(255, 198, 110, 0.3); }
  .bullet-demo { background: rgba(255, 91, 91, 0.12); color: var(--danger); border: 1px solid rgba(255, 91, 91, 0.3); }

  /* Next slide preview */
  .next-preview {
    margin-top: 28px;
    padding: 16px 20px;
    background: var(--bg-2);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
  }
  .next-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 8px;
  }
  .next-title {
    font-size: 17px;
    color: var(--muted);
  }

  /* ── Footer progress ── */
  .footer-bar {
    grid-column: 1 / -1;
    background: var(--bg-2);
    border-top: 1px solid var(--border);
    padding: 0;
    position: relative;
    height: 6px;
  }
  .progress {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 0 3px 3px 0;
    transition: width 400ms cubic-bezier(.2,.8,.2,1);
  }

  /* Status dot */
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
  }
  .status-dot.connected {
    background: var(--ok);
    box-shadow: 0 0 8px var(--ok);
    animation: pulse-status 2s infinite;
  }
  .status-text { color: var(--dim); }
  .status-dot.connected + .status-text { color: var(--ok); }

  @keyframes pulse-status {
    0%, 100% { box-shadow: 0 0 4px var(--ok); }
    50% { box-shadow: 0 0 12px var(--ok); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>

<div class="presenter">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="slide-counter">
        <span class="current">01</span><span class="sep">/</span><span class="total">24</span>
      </div>
      <div class="slide-title" id="slideTitle">Portada</div>
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-text" id="statusText">DESCONECTADO</div>
      </div>
    </div>
    <div class="header-right">
      <div class="nav-btns">
        <button class="nav-btn" id="btnPrev" title="Anterior (←)">← Anterior</button>
        <button class="nav-btn" id="btnNext" title="Siguiente (→)">Siguiente →</button>
      </div>
      <div class="timer-group">
        <div class="timer" id="timer">00:00:00</div>
        <div style="display:flex;gap:6px;margin-top:4px;justify-content:flex-end;">
          <button class="timer-btn" id="timerToggle">Iniciar</button>
          <button class="timer-btn" id="timerReset">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Left column: Speaker notes -->
  <div class="col-notes" id="colNotes">
    <div class="col-label"><span class="dot"></span> NOTAS DEL DISERTANTE</div>
    <div class="notes-timing" id="notesTiming"></div>
    <div class="notes-body" id="notesBody"></div>
  </div>

  <!-- Right column: Key points guide -->
  <div class="col-guide" id="colGuide">
    <div class="col-label"><span class="dot"></span> PUNTOS CLAVE · QUE HACER</div>
    <ul class="key-points" id="keyPoints"></ul>
    <div class="next-preview" id="nextPreview">
      <div class="next-label">Siguiente slide</div>
      <div class="next-title" id="nextTitle"></div>
    </div>
  </div>

  <!-- Footer progress -->
  <div class="footer-bar">
    <div class="progress" id="progress" style="width: 4.17%;"></div>
  </div>
</div>

const BULLET_ICONS = {
  talk: { cls: 'bullet-talk', icon: '▸' },
  do:   { cls: 'bullet-do',   icon: '◆' },
  warn: { cls: 'bullet-warn', icon: '!' },
  demo: { cls: 'bullet-demo', icon: '●' },
};

// ── State ──
let currentIndex = 0;
let timerRunning = false;
let timerStart = null;
let timerElapsed = 0;
let timerInterval = null;

// ── DOM refs ──
const counterCurrent = document.querySelector('.slide-counter .current');
const counterTotal = document.querySelector('.slide-counter .total');
const slideTitleEl = document.getElementById('slideTitle');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const notesTimingEl = document.getElementById('notesTiming');
const notesBodyEl = document.getElementById('notesBody');
const keyPointsEl = document.getElementById('keyPoints');
const nextTitleEl = document.getElementById('nextTitle');
const nextPreviewEl = document.getElementById('nextPreview');
const progressEl = document.getElementById('progress');
const timerEl = document.getElementById('timer');
const colNotesEl = document.getElementById('colNotes');
const colGuideEl = document.getElementById('colGuide');

// ── Render ──
function render(index) {
  currentIndex = index;
  const slide = SLIDES[index];
  const note = NOTES[index] || '';

  // Header
  counterCurrent.textContent = String(index + 1).padStart(2, '0');
  counterTotal.textContent = String(SLIDES.length);
  slideTitleEl.textContent = slide.title;

  // Notes
  notesTimingEl.textContent = `⏱ ${slide.timing}  ·  ${slide.section}`;

  // Format note text: highlight text between em dashes and key phrases
  const formatted = note
    .replace(/—([^—]+)—/g, '<em>—$1—</em>')
    .replace(/(no piensa|no es consciente|no se equivoca|no busca|construye|criterio|hipótesis|verificar|verificá|público|versión exacta|contexto \+ tecnología \+ objetivo \+ criterio|la fórmula|USB-C|exportable)/gi, '<em>$1</em>');
  notesBodyEl.innerHTML = formatted;

  // Key points
  keyPointsEl.innerHTML = '';
  slide.points.forEach(p => {
    const li = document.createElement('li');
    const b = BULLET_ICONS[p.type] || BULLET_ICONS.talk;
    li.innerHTML = `<span class="bullet ${b.cls}">${b.icon}</span><span>${p.text}</span>`;
    keyPointsEl.appendChild(li);
  });

  // Next preview
  if (index < SLIDES.length - 1) {
    nextPreviewEl.style.display = '';
    const next = SLIDES[index + 1];
    nextTitleEl.textContent = `${String(index + 2).padStart(2, '0')} — ${next.title}  (${next.timing})`;
  } else {
    nextPreviewEl.style.display = 'none';
  }

  // Progress
  const pct = ((index + 1) / SLIDES.length) * 100;
  progressEl.style.width = pct + '%';

  // Scroll to top
  colNotesEl.scrollTop = 0;
  colGuideEl.scrollTop = 0;
}

// ── Timer ──
function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function updateTimer() {
  const now = Date.now();
  const total = timerElapsed + (timerRunning ? now - timerStart : 0);
  timerEl.textContent = formatTime(total);
}

document.getElementById('timerToggle').addEventListener('click', () => {
  if (timerRunning) {
    timerElapsed += Date.now() - timerStart;
    timerRunning = false;
    clearInterval(timerInterval);
    document.getElementById('timerToggle').textContent = 'Continuar';
  } else {
    timerStart = Date.now();
    timerRunning = true;
    timerInterval = setInterval(updateTimer, 1000);
    updateTimer();
    document.getElementById('timerToggle').textContent = 'Pausar';
  }
});

document.getElementById('timerReset').addEventListener('click', () => {
  timerElapsed = 0;
  timerStart = Date.now();
  updateTimer();
});

// ── Navigation (local + broadcast) ──
const bc = new BroadcastChannel('deck-presenter');

function goNext() { bc.postMessage({ type: 'nav-next' }); }
function goPrev() { bc.postMessage({ type: 'nav-prev' }); }

document.getElementById('btnNext').addEventListener('click', goNext);
document.getElementById('btnPrev').addEventListener('click', goPrev);

window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
});

// ── Sync ──
let connected = false;

bc.addEventListener('message', (e) => {
  if (e.data.type === 'slidechange') {
    if (!connected) {
      connected = true;
      statusDot.classList.add('connected');
      statusText.textContent = 'SINCRONIZADO';
    }
    render(e.data.index);
  }
});

// Request current state on load
bc.postMessage({ type: 'request-sync' });

// If no response in 2s, show first slide anyway
setTimeout(() => {
  if (!connected) render(0);
}, 2000);

// Initial render
render(0);
</script>
